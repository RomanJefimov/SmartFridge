<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Fridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="user.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <img src="/images/ice.png" alt="Smart fridge logo">
            <h1>Smart Fridge</h1>
        </div>
        <div class="header-icons">
            <img src="/images/guide_icon.svg" alt="Guide icon">
            <img src="/images/profile_picture.png" alt="Profile picture">
        </div>
    </header>
    <main>
        <nav>
            <div class="download">
                <img src="/images/download_icon.svg" alt="Download icon">
                <h2>Download Picture</h2>
            </div>
            <div class="my-fridge">
                <details open>
                    <img src="/images/fridge_icon.svg" alt="Fridge icon">
                    <summary>My Fridge</summary>
                    <p>List of products</p>
                    <p>Recipes</p>
                    <p>History</p>
                </details>
            </div>
            <div class="profile">
                <details open>
                    <img src="/images/profile_icon.svg" alt="Profile icon">
                    <summary>Profile</summary>
                    <p>Personal characteristics</p>
                    <p>Analysis</p>
                </details>
            </div>
        </nav>
        <div class="content">
            <h1>Fridge is empty</h1>
            <button class="btn">Download picture <img src="/images/download_icon.svg" alt="Download icon"></button>
        </div>
    </main>
    <footer>
        <p>© 2026 Smart Fridge.</p></footer>
</body>
</html>
