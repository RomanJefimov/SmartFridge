<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 — Smart Fridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Manrope", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #F5FBFF;
            color: #1a1a1a;
        }

        header {
            height: 75px;
            border-bottom: 1px solid #BEBEBE;
            display: flex;
            align-items: center;
            padding: 0 18px;
            background: #fff;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
        }

        .logo img {
            width: 60px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .fridge-icon {
            font-size: 80px;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: #009FE3;
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -4px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .error-desc {
            font-size: 16px;
            color: #888;
            max-width: 380px;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border: 2px solid #50AAFF;
            border-radius: 12px;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            font-family: "Manrope", sans-serif;
            font-weight: 600;
            color: #009FE3;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }

        .btn-home:hover {
            background: #009FE3;
            color: #fff;
        }

        footer {
            height: 70px;
            border-top: 1px solid #BEBEBE;
            display: flex;
            align-items: center;
            padding-left: 40px;
            font-size: 14px;
            color: #888;
            background: #fff;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <img src="/images/ice.png" alt="Smart Fridge logo">
            <h1>Smart Fridge</h1>
        </a>
    </header>

    <main>
        <div class="fridge-icon">🧊</div>
        <div class="error-code">404</div>
        <h2 class="error-title">Page not found</h2>
        <p class="error-desc">Looks like this page is as empty as your fridge at midnight. Let's get you back on track.</p>
        <a href="/" class="btn-home">← Go back home</a>
    </main>

    <footer>
        <p>© 2026 Smart Fridge.</p>
    </footer>
</body>
</html>
